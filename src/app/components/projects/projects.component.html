<section id="projects" class="py-28 px-6 relative">
  <div class="max-w-6xl mx-auto">
    <div class="section-header"
      [ngClass]="IsVisible ? 'animate-slide-up' : 'opacity-0 translate-y-8'">
      <span class="section-label">Work</span>
      <h2 class="section-title">Featured <span class="hero-gradient-text">Projects</span></h2>
      <p class="section-subtitle">A selection of my recent work. Click any project to explore details.</p>
    </div>

    <div class="grid md:grid-cols-2 gap-7 mt-16">
      <div *ngFor="let Project of Projects; let i = index"
        class="project-card group cursor-pointer"
        [ngClass]="IsVisible ? 'animate-fade-in-up' : 'opacity-0 translate-y-8'"
        [style.animation-delay]="(i * 100) + 'ms'"
        (click)="OpenProject(Project)">

        <!-- Image with overlay -->
        <div class="relative h-52 overflow-hidden rounded-xl mb-5">
          <img [src]="Project.Image" [alt]="Project.Title"
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"/>
          <div class="absolute inset-0 bg-gradient-to-t from-[var(--bg-deep)]/80 via-transparent to-transparent
                      opacity-0 group-hover:opacity-100 transition-opacity duration-400 flex items-end p-4">
            <span class="text-white text-sm font-semibold flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              View Details
            </span>
          </div>
          <div *ngIf="Project.Featured"
            class="absolute top-3 left-3 px-2.5 py-1 rounded-full bg-violet-600/90 backdrop-blur-sm text-white text-xs font-bold">
            Featured
          </div>
        </div>

        <h3 class="text-[var(--text)] font-bold text-xl mb-2 pl-2.5 group-hover:text-violet-400 transition-colors duration-300">
          {{ Project.Title }}
        </h3>
        <p class="text-[var(--text-muted)] text-sm leading-relaxed mb-4 pl-2.5">
          {{ Project.Description }}
        </p>

        <div class="flex flex-wrap gap-2 mb-4">
          <span *ngFor="let Tech of Project.Tech" class="tech-tag">{{ Tech }}</span>
        </div>

        <div class="flex gap-4 pt-1">
          <a [href]="Project.Github" (click)="$event.stopPropagation()" class="project-link">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
            </svg>
            GitHub
          </a>
          <a [href]="Project.Link" (click)="$event.stopPropagation()" class="project-link">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
            Live Demo
          </a>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Project Modal -->
<div *ngIf="IsModalOpen"
  class="fixed inset-0 z-[200] flex items-center justify-center p-4 sm:p-6"
  (click)="CloseModal()">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-md animate-fade-in"></div>

  <div class="relative max-w-2xl w-full bg-[var(--bg-card)] border border-[var(--border)] rounded-3xl overflow-hidden shadow-2xl animate-modal-in"
    (click)="$event.stopPropagation()">
    <button (click)="CloseModal()"
      class="absolute top-4 right-4 z-10 w-9 h-9 rounded-xl bg-black/30 backdrop-blur-sm flex items-center justify-center
             text-white hover:bg-black/50 transition-all duration-200 cursor-pointer text-lg">
      ×
    </button>

    <div class="h-56 overflow-hidden">
      <img [src]="SelectedProject?.Image" [alt]="SelectedProject?.Title" class="w-full h-full object-cover"/>
    </div>

    <div class="p-7">
      <h3 class="text-[var(--text)] text-2xl font-black mb-3">{{ SelectedProject?.Title }}</h3>
      <p class="text-[var(--text-muted)] leading-relaxed mb-5">{{ SelectedProject?.Description }}</p>

      <div class="flex flex-wrap gap-2 mb-6">
        <span *ngFor="let Tech of SelectedProject?.Tech" class="tech-tag">{{ Tech }}</span>
      </div>

      <div class="flex gap-4">
        <a [href]="SelectedProject?.Github" class="cta-secondary text-sm flex-1 justify-center cursor-pointer">
          View Code
        </a>
        <a [href]="SelectedProject?.Link" class="cta-primary text-sm flex-1 justify-center cursor-pointer">
          Live Demo
        </a>
      </div>
    </div>
  </div>
</div>
