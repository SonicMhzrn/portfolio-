<div class="ud-page">

  <!-- Gear spinner -->
  <div class="ud-gear-wrap">
    <div class="ud-gear ud-gear-outer"></div>
    <div class="ud-gear ud-gear-mid"></div>
    <div class="ud-gear ud-gear-inner"></div>
    <div class="ud-gear-dot"></div>
  </div>

  <!-- Badge -->
  <div class="ud-badge">
    <span class="ud-badge-dot"></span>
    In development
  </div>

  <!-- Heading -->
  <h1 class="ud-title">We're building something great</h1>
  <p class="ud-sub">This page is currently under development. Our team is working hard to bring it to you soon.</p>

  <!-- Progress -->
  <div class="ud-progress-wrap">
    <div class="ud-progress-label">
      <span>Overall progress</span>
      <span>65%</span>
    </div>
    <div class="ud-progress-track">
      <div class="ud-progress-fill"></div>
    </div>
  </div>

  <!-- Tasks -->
  <div class="ud-tasks">
    <div class="ud-task ud-task--done">
      <div class="ud-task-icon ud-icon-done">
        <svg width="10" height="10" fill="none" viewBox="0 0 10 10">
          <path d="M1.5 5l2 2 4-4" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      Design complete
    </div>
    <div class="ud-task ud-task--done">
      <div class="ud-task-icon ud-icon-done">
        <svg width="10" height="10" fill="none" viewBox="0 0 10 10">
          <path d="M1.5 5l2 2 4-4" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      Components built
    </div>
    <div class="ud-task">
      <div class="ud-task-icon ud-icon-wip">
        <svg width="10" height="10" fill="none" viewBox="0 0 10 10">
          <circle cx="5" cy="5" r="3.5" stroke="#534AB7" stroke-width="1.5"/>
          <path d="M5 3v2l1 1" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      API integration
    </div>
    <div class="ud-task">
      <div class="ud-task-icon ud-icon-todo">
        <svg width="10" height="10" fill="none" viewBox="0 0 10 10">
          <circle cx="5" cy="5" r="3.5" stroke="#888780" stroke-width="1.5"/>
        </svg>
      </div>
      QA testing
    </div>
  </div>

  <!-- Bouncing dots -->
  <div class="ud-dots">
    <div class="ud-dot"></div>
    <div class="ud-dot"></div>
    <div class="ud-dot"></div>
  </div>

</div>
