<nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
  [ngClass]="IsScrolled
    ? 'bg-[var(--bg-glass)] backdrop-blur-xl border-b border-[var(--border)] shadow-2xl'
    : 'bg-transparent'">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">

    <!-- Logo -->
    <button (click)="ScrollTo('hero')" class="flex items-center gap-3 group cursor-pointer">
      <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-violet-500 via-purple-500 to-indigo-600
                  flex items-center justify-center text-white font-black text-sm
                  shadow-lg shadow-violet-500/30 group-hover:scale-110 group-hover:rotate-3 transition-all duration-300">
        SM
      </div>
      <span class="text-[var(--text)] font-bold text-lg hidden sm:block tracking-tight">
        Sonic<span class="text-violet-400">.</span>
      </span>
    </button>

    <!-- Desktop Nav -->
    <ul class="hidden md:flex items-center gap-1">
      <li *ngFor="let Link of NavLinks">
        <button (click)="ScrollTo(Link.Section)"
          class="relative px-4 py-2 rounded-xl text-sm font-medium transition-all duration-300 cursor-pointer group"
          [ngClass]="IsActive(Link.Section)
            ? 'text-white'
            : 'text-[var(--text-muted)] hover:text-[var(--text)]'">
          <span class="relative z-10">{{ Link.Label }}</span>
          <span *ngIf="IsActive(Link.Section)"
            class="absolute inset-0 rounded-xl bg-violet-600/20 border border-violet-500/30">
          </span>
          <span *ngIf="IsActive(Link.Section)"
            class="absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-violet-400">
          </span>
        </button>
      </li>
    </ul>

    <!-- Right side -->
    <div class="flex items-center gap-3">
      <!-- Dark/Light toggle -->
      <button (click)="ToggleTheme()"
        class="w-9 h-9 rounded-xl border border-[var(--border)] flex items-center justify-center
               text-[var(--text-muted)] hover:text-[var(--text)] hover:border-violet-500/50
               transition-all duration-300 hover:scale-110 cursor-pointer bg-[var(--bg-card)]">
        <svg *ngIf="IsDark" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg *ngIf="!IsDark" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>

      <!-- Hire Me CTA -->
      <button (click)="ScrollTo('contact')"
        class="hidden md:inline-flex items-center gap-2 px-5 py-2.5 rounded-xl
               bg-gradient-to-r from-violet-600 to-indigo-600 text-white text-sm font-semibold
               hover:from-violet-500 hover:to-indigo-500 transition-all duration-300
               hover:scale-105 hover:shadow-lg hover:shadow-violet-500/30 cursor-pointer">
        Hire Me
      </button>

      <!-- Hamburger -->
      <button (click)="ToggleMobileMenu()"
        class="md:hidden w-9 h-9 rounded-xl border border-[var(--border)] flex items-center justify-center
               text-[var(--text-muted)] hover:text-[var(--text)] transition-all duration-200 cursor-pointer
               bg-[var(--bg-card)]"
        aria-label="Toggle menu">
        <svg *ngIf="!IsMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg *ngIf="IsMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="IsMobileMenuOpen"
    class="md:hidden bg-[var(--bg-glass)] backdrop-blur-xl border-t border-[var(--border)] px-6 py-5 animate-slide-down">
    <ul class="flex flex-col gap-1">
      <li *ngFor="let Link of NavLinks">
        <button (click)="ScrollTo(Link.Section)"
          class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 cursor-pointer"
          [ngClass]="IsActive(Link.Section)
            ? 'text-white bg-violet-500/20 border border-violet-500/20'
            : 'text-[var(--text-muted)] hover:text-[var(--text)] hover:bg-[var(--bg-card)]'">
          {{ Link.Label }}
        </button>
      </li>
      <li class="pt-2">
        <button (click)="ScrollTo('contact')"
          class="w-full px-4 py-3 rounded-xl bg-gradient-to-r from-violet-600 to-indigo-600
                 text-white text-sm font-semibold cursor-pointer hover:opacity-90 transition-opacity">
          Hire Me
        </button>
      </li>
    </ul>
  </div>
</nav>
